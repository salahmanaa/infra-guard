<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Smart City</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #222; color: white; }
        #sidebar { width: 350px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 1px solid #444; }
        #map { flex: 1; }
        .alert-card { background: #333; padding: 15px; margin-bottom: 15px; border-radius: 8px; cursor: pointer; border-left: 5px solid #22c55e; }
        .alert-card:hover { background: #444; }
        .alert-card b { color: #22c55e; font-size: 1.1em; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>📋 Réclamations Reçues</h2>
        <div id="alert-list">En attente de réclamations...</div>
    </div>

    <div id="map"></div>

   <script>
    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const alertList = document.getElementById("alert-list");

    // Fonction pour ajouter une alerte à l'interface
    function displayAlert(data) {
        if (alertList.innerText.includes("En attente")) alertList.innerHTML = "";

        const card = document.createElement("div");
        card.className = "alert-card";
        card.innerHTML = `
            <b>${data.type.toUpperCase()}</b><br>
            <small>${data.time}</small>
        `;
        card.onclick = () => map.setView([data.lat, data.lng], 18);
        alertList.prepend(card);

        L.marker([data.lat, data.lng]).addTo(map).bindPopup(data.type);
    }

    // A. Charger les réclamations sauvegardées au démarrage
    const savedAlerts = JSON.parse(localStorage.getItem('smart_city_history')) || [];
    savedAlerts.forEach(alert => displayAlert(alert));

    // B. Écouter les nouvelles réclamations en temps réel
    const bc = new BroadcastChannel('smart_city_alerts');
    bc.onmessage = (event) => displayAlert(event.data);
</script>
</body>

</html>
