<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Smart City - Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; }
        .controls { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; background: #444; color: #fff; }
        button.active { background: #22c55e; }
        #webcam-container { margin: 10px auto; border: 2px solid #555; display: inline-block; border-radius: 10px; overflow: hidden; }
        #result { font-size: 24px; font-weight: bold; margin-top: 15px; color: #22c55e; }
        .btn-claim { background: #ff4757 !important; color: white; width: 100%; max-width: 320px; padding: 15px; font-weight: bold; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <h1>🏙️ Smart City Monitor</h1>
    
    <div class="controls">
        <button id="roadBtn" onclick="switchMode('road')">Route (Propre/Sale)</button>
        <button id="wasteBtn" onclick="switchMode('waste')">Déchets (Plastique...)</button>
    </div>

    <div id="webcam-container"></div>
    <div id="result">Initialisez un mode...</div>
    <div id="confidence"></div>

    <button id="claimBtn" class="btn-claim" onclick="sendReclamation()">🚨 ENVOYER RÉCLAMATION</button>

    <script type="text/javascript">
        // CONFIGURATION FIREBASE
        const firebaseConfig = { databaseURL: "https://console.firebase.google.com/project/smartcity-b4b77/database/smartcity-b4b77-default-rtdb/data/~2F" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let model, webcam, maxPredictions, currentMode = "", currentResult = "";

        const paths = {
            road: "./models/road/",
            waste: "./models/waste/"
        };

        async function switchMode(mode) {
            currentMode = mode;
            document.getElementById("roadBtn").className = (mode === 'road') ? "active" : "";
            document.getElementById("wasteBtn").className = (mode === 'waste') ? "active" : "";
            document.getElementById("result").innerText = "Chargement...";

            const URL = paths[mode];
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                if (!webcam) {
                    webcam = new tmImage.Webcam(320, 320, false);
                    await webcam.setup({ facingMode: "environment" });
                    await webcam.play();
                    document.getElementById("webcam-container").appendChild(webcam.canvas);
                    window.requestAnimationFrame(loop);
                }
                document.getElementById("result").innerText = "Prêt à scanner";
                document.getElementById("claimBtn").style.display = "inline-block";
            } catch (err) {
                document.getElementById("result").innerText = "Erreur de chargement";
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (!model) return;
            const predictions = await model.predict(webcam.canvas);
            let bestMatch = predictions.reduce((a, b) => a.probability > b.probability ? a : b);
            currentResult = bestMatch.className;
            document.getElementById("result").innerText = currentResult.toUpperCase();
            document.getElementById("confidence").innerText = "Confiance: " + (bestMatch.probability * 100).toFixed(1) + "%";
        }

        function sendReclamation() {
            if (!navigator.geolocation) return;
            
            // Paramètres pour haute précision GPS
            const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

            navigator.geolocation.getCurrentPosition((pos) => {
                const alertData = {
                    type: currentResult,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    time: new Date().toLocaleString(),
                    accuracy: pos.coords.accuracy
                };

                // Envoi à la base de données Cloud Firebase
                database.ref('reclamations').push(alertData)
                .then(() => alert("Succès : Envoyé au Cloud !"))
                .catch((e) => alert("Erreur Cloud: " + e));

            }, (err) => alert("Erreur GPS: " + err.message), options);
        }
    </script>
</body>
</html>
